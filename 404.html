<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aixel Documentation</title>
    <script>
      ;(function () {
        var redirect = sessionStorage.getItem('gh-pages-redirect')
        if (redirect) {
          sessionStorage.removeItem('gh-pages-redirect')
          history.replaceState(null, '', redirect)
        }
      })()
    </script>
  </head>
  <body>
    <script>
      sessionStorage.setItem('gh-pages-redirect', location.pathname + location.search + location.hash)
      location.replace('/documentation/')
    </script>
  </body>
</html>
